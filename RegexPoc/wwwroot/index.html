<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>.NET Regex Tester</title>
    <base href="/" />
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 24px;
            color: #222;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: "Consolas", "Courier New", monospace;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        .checkbox-group {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
        }

        .checkbox-group label {
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        button {
            padding: 8px 18px;
            border: none;
            border-radius: 4px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-find   { background: #7c3aed; color: #fff; }
        .btn-find:hover { background: #6d28d9; }

        .btn-replace { background: #2563eb; color: #fff; }
        .btn-replace:hover { background: #1d4ed8; }

        .btn-apply  { background: #0891b2; color: #fff; }
        .btn-apply:hover { background: #0e7490; }

        .btn-clear  { background: #9ca3af; color: #fff; }
        .btn-clear:hover { background: #6b7280; }

        .error-card {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 12px 16px;
            border-radius: 4px;
            color: #b91c1c;
            margin-top: 12px;
            font-size: 0.9rem;
        }

        .match-card {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            padding: 10px 14px;
            border-radius: 4px;
            margin-bottom: 8px;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 0.9rem;
        }

        .match-card .match-meta {
            color: #555;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .match-card .capture-groups {
            color: #6b7280;
            font-size: 0.82rem;
            margin-top: 6px;
        }

        .result-section {
            margin-top: 20px;
        }

        .result-section h2 {
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .replace-result {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }

        #app { max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="app">Loading...</div>
    <div id="blazor-error-ui" style="display:none;background:#ffcc00;padding:8px;text-align:center;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
